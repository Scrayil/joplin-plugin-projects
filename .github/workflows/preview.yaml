name: GitHub Prerelease Pipeline

on:
  push:
    tags:
      - 'v*-alpha*'
      - 'v*-preview*'
      - 'v*-beta*'
      - 'v*-rc*'

permissions:
  contents: write

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enforce Tag and Package Version Alignment
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION=$(echo "${GITHUB_REF_NAME#v}" | cut -d'-' -f1)
          
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch. Tag core version: ${TAG_VERSION}, package.json: ${PKG_VERSION}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run dist

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: publish/*.jpl
