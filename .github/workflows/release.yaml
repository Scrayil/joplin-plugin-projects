# SPDX-License-Identifier: AGPL-3.0-or-later
name: NPM Stable Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-alpha*'
      - '!v*-preview*'
      - '!v*-beta*'
      - '!v*-rc*'

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enforce Tag and Package Version Alignment
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch. Tag: ${TAG_VERSION}, package.json: ${PKG_VERSION}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci

      - run: npm run dist

      - name: Extract latest changelog section
        run: awk '/^\[v/{c++} c==2{exit} c>=1{print}' CHANGELOG.md > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: publish/*.jpl

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}